<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 BTC/USDT Live Signals - VWAP + EMA + RSI + MACD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --green: #00ff88;
            --red: #ff4444;
            --orange: #ffaa00;
            --blue: #7aa3ff;
            --purple: #bb86fc;
            --bg-dark: #0a0e27;
            --bg-card: #1a1e3e;
            --cyan: #18ffff;
            --text: #e8eaf6;
            --text2: #7986cb;
            --border: #263055;
        }
        
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-card) 100%);
            color: var(--green);
            padding: min(20px, 3vw);
            min-height: 100vh;
            font-size: clamp(10px, 1.5vw, 14px);
            overflow-x: hidden;
        }
        
        .app {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 56px 1fr;
            gap: 1px;
            background: var(--border);
            min-height: 100vh;
        }
        
        /* ── HEADER ── */
        .hdr {
            grid-column: 1/-1;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .hdr-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .logo-dot {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            border-radius: 7px;
            animation: glow 2s infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 12px 4px rgba(0, 255, 136, 0.15); }
        }
        
        .hdr-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: blink 1.2s infinite;
            display: inline-block;
        }
        
        @keyframes blink {
            50% { opacity: 0.3; }
        }
        
        .hdr-tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background: var(--red);
            color: #fff;
            padding: 3px 10px;
            border-radius: 10px;
        }
        
        .hdr-center {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .hdr-price {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .hdr-change {
            font-size: 12px;
        }
        
        .hdr-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .hdr-clock {
            font-size: 17px;
            font-weight: 700;
        }
        
        .hdr-utc {
            font-size: 10px;
            color: var(--text2);
        }
        
        .hdr-btn {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            transition: 0.2s;
        }
        
        .hdr-btn:hover {
            border-color: var(--blue);
            color: var(--text);
        }
        
        /* ── STATUS BADGES ── */
        .badge {
            position: fixed;
            z-index: 900;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 700;
            backdrop-filter: blur(8px);
        }
        
        .badge-api {
            top: 64px;
            right: 16px;
        }
        
        .badge-ws {
            top: 64px;
            left: 16px;
        }
        
        .badge.ok {
            background: rgba(0, 255, 136, 0.15);
            color: var(--green);
            border: 1px solid var(--green);
        }
        
        .badge.err {
            background: rgba(255, 68, 68, 0.15);
            color: var(--red);
            border: 1px solid var(--red);
        }
        
        .badge.wait {
            background: rgba(68, 138, 255, 0.15);
            color: var(--blue);
            border: 1px solid var(--blue);
        }
        
        /* ── PANELS ── */
        .side-l, .side-r {
            background: var(--bg-card);
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .main {
            background: var(--bg-dark);
            padding: 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 12px;
            padding: min(20px, 2.5vw);
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.7);
        }
        
        .card-title {
            font-size: clamp(15px, 2.2vw, 20px);
            color: var(--green);
            margin-bottom: min(18px, 2.5vw);
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0, 255, 136, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        
        .indicator-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: min(12px, 2vw) 0;
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
            gap: 10px;
        }
        
        .indicator-label {
            color: var(--blue);
            font-weight: 500;
            font-size: clamp(12px, 1.6vw, 14px);
        }
        
        .indicator-value {
            color: #fff;
            font-weight: bold;
            font-size: clamp(14px, 1.8vw, 18px);
            min-width: 80px;
            text-align: right;
        }
        
        .indicator-bar {
            flex: 1;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin: 0 12px;
            position: relative;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.5s ease;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .bar-green { background: linear-gradient(90deg, var(--green), #00cc66); }
        .bar-red { background: linear-gradient(90deg, var(--red), #cc0000); }
        .bar-orange { background: linear-gradient(90deg, var(--orange), #ff8800); }
        .bar-purple { background: linear-gradient(90deg, var(--purple), #aa77ee); }
        
        /* ── MAIN SIGNAL DISPLAY ── */
        .sig-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            transition: 0.3s;
